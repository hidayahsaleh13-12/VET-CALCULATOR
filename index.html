<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Vet Interactive Pro</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --bg-dark: #050a10;
        }

        body {
            margin: 0; background-color: var(--bg-dark);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background-image: radial-gradient(circle at center, #102a43 0%, #050a10 100%);
            overflow: hidden;
        }

        .stage { text-align: center; width: 100%; max-width: 500px; padding: 20px; }

        /* Glass Box dengan Animasi Transition */
        .glass-box {
            background: rgba(10, 20, 30, 0.85);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-box.success {
            border-color: var(--neon-green);
            box-shadow: 0 0 50px rgba(57, 255, 20, 0.4);
            transform: translateY(-10px);
        }

        h2 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 3px; font-size: 12px; margin-bottom: 20px; opacity: 0.8; }
        .question { color: white; font-size: 1.6rem; margin-bottom: 30px; font-weight: 300; min-height: 80px; }

        /* Input Style */
        .input-wrapper { position: relative; }
        input {
            background: transparent; border: none; border-bottom: 2px solid rgba(255,255,255,0.1);
            color: white; font-size: 28px; text-align: center; width: 100%;
            outline: none; padding: 10px 0; transition: 0.3s;
        }
        input:focus { border-bottom-color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }

        /* Result View */
        #result-view { display: none; }
        .result-value { font-size: 4.5rem; font-weight: bold; color: var(--neon-green); text-shadow: 0 0 30px var(--neon-green); margin: 10px 0; }
        
        /* Butang Carian Baru */
        .btn-reset {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 30px;
            font-size: 14px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-reset:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* Fade Animation */
        .fade-in { animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
</head>
<body>

<div class="stage">
    <div class="glass-box" id="box">
        <h2 id="step-title">LANGKAH 1 // DIAGNOSIS</h2>
        <div id="quiz-view">
            <div class="question" id="q-text">Apakah simptom haiwan tersebut?</div>
            <div class="input-wrapper">
                <input type="text" id="userInput" autofocus autocomplete="off" placeholder="Taip di sini...">
            </div>
        </div>

        <div id="result-view" class="fade-in">
            <div class="question" id="res-msg" style="min-height: auto; margin-bottom: 10px;">Dos Diperlukan:</div>
            <div class="result-value" id="final-ml">0.00 mL</div>
            <p id="final-detail" style="color: #888; font-size: 14px;"></p>
            <button class="btn-reset" onclick="resetSystem()">Carian Baru</button>
        </div>
    </div>
</div>

<script>
    const box = document.getElementById('box');
    const qText = document.getElementById('q-text');
    const title = document.getElementById('step-title');
    const input = document.getElementById('userInput');
    const quizView = document.getElementById('quiz-view');
    const resultView = document.getElementById('result-view');
    const finalMl = document.getElementById('final-ml');
    const finalDetail = document.getElementById('final-detail');

    let step = 0;
    let data = { simptom: '', jenis: '', berat: 0, ubat: '', kadar: 0 };

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = input.value.trim();
            if (val === "") return;
            processStep(val);
            input.value = "";
        }
    });

    function processStep(val) {
        if (step === 0) {
            data.simptom = val.toLowerCase();
            updateUI("LANGKAH 2 // ENTITI", "Apakah jenis haiwan?");
            step = 1;
        } 
        else if (step === 1) {
            data.jenis = val;
            updateUI("LANGKAH 3 // BERAT", `Berapakah berat ${val} (kg)?`);
            step = 2;
        } 
        else if (step === 2) {
            data.berat = parseFloat(val);
            // Logic Ubat
            if (data.simptom.includes('demam')) { data.ubat = "Meloxicam"; data.kadar = 0.2; }
            else if (data.simptom.includes('cacing')) { data.ubat = "Pyrantel"; data.kadar = 5; }
            else { data.ubat = "Ubat Am"; data.kadar = 1; }

            updateUI("LANGKAH 4 // DOS", `Kepekatan ${data.ubat} (mg/mL)?`);
            step = 3;
        } 
        else if (step === 3) {
            const kepekatan = parseFloat(val);
            const ml = (data.berat * data.kadar) / kepekatan;
            showFinal(ml.toFixed(2));
        }
    }

    function updateUI(stepName, question) {
        title.style.opacity = 0;
        qText.style.opacity = 0;
        setTimeout(() => {
            title.innerText = stepName;
            qText.innerText = question;
            title.style.opacity = 0.8;
            qText.style.opacity = 1;
        }, 200);
    }

    function showFinal(ml) {
        quizView.style.display = 'none';
        resultView.style.display = 'block';
        box.classList.add('success');
        title.innerText = "Selesai";
        finalMl.innerText = ml + " mL";
        finalDetail.innerText = `Rawatan: ${data.ubat} | Haiwan: ${data.jenis} (${data.berat}kg)`;
    }

    
    function resetSystem() {
        // Reset Data
        step = 0;
        data = { simptom: '', jenis: '', berat: 0, ubat: '', kadar: 0 };
        
        // Reset UI
        box.classList.remove('success');
        resultView.style.display = 'none';
        quizView.style.display = 'block';
        title.innerText = "LANGKAH 1 // DIAGNOSIS";
        qText.innerText = "Apakah simptom haiwan tersebut?";
        
        input.value = "";
        setTimeout(() => input.focus(), 100);
    }
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
